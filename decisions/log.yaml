  tags: [openclaw, upgrade]

- decision: "Routing feedback architecture"
  choice: "CXDB authoritative + Chroma semantic index"
  rationale: "Dual-write via routing shim CEG:8100. Idempotent via optional record_id."
  session: 17
  tags: [routing, cxdb, chroma]

- decision: "Nomenclature"
  choice: "Disciplines (not models), tools (not capabilities), sub-agents (not services)"
  rationale: "Matches James's mental model. Models are specializations Zuberi has earned."
  session: 15
  tags: [nomenclature]

- decision: "Mission"
  choice: "Recursive self-improvement via James interaction"
  rationale: "Corrected from revenue target across all files."
  session: 12
  tags: [mission]

- decision: "Remove tools.allow global whitelist"
  choice: "Delete tools.allow from openclaw.json entirely"
  rationale: "tools.allow was set to [read, write, exec], blocking all 27 other tools at the config level. Agent-level overrides cannot override a global whitelist. Zuberi's session only loaded 3 tools. Root cause of exec-only behavior and inability to use browser, web_search, memory, sessions tools. Removing it lets all tools be available, controlled per-agent."
  session: 22
  tags: [openclaw, tools, config, critical-fix]

- decision: "Shell service: user service → system service"
  choice: "Convert zuberi-shell.service from systemd user service to system service"
  rationale: "User services run in UID namespace where root remaps to uid 65534 (nobody). sudo binary appears not owned by root, setuid bit stripped. System service runs under PID 1 with real UIDs. Zuberi needs sudo for package installs and system config."
  session: 22
  tags: [ceg, shell-service, sudo, security]

- decision: "GUI workstation: Brave + CDP, not Playwright"
  choice: "Dedicated Brave browser with remote debugging, OpenClaw browser tool via CDP"
  rationale: "OpenClaw v2026.3.13 ships native browser automation via CDP. No need for Playwright. Brave is Chromium-based, CDP works identically. Isolated profile at C:\\Users\\PLUTO\\zuberi-brave-profile. Zuberi gets her own browser, James keeps his."
  session: 22
  tags: [browser, rtl-064, brave, cdp]

- decision: "Corrections log location"
  choice: "skills/corrections/corrections.md, not workspace root"
  rationale: "Root files are auto-loaded every turn and burn tokens. Skills are read on demand. Agent 21 caught this in audit."
  session: 22
  tags: [corrections, workspace, token-budget]

- decision: "version.json: build artifact, not ccode responsibility"
  choice: "Do NOT manually write version.json in ccode prompts"
  rationale: "version.json is gitignored, regenerated by update-local.ps1 → generate-version.ps1 with all three required fields (version, commit, builtAt). Manual writes with only {version} broke the update indicator for 5 sessions."
  session: 22
  tags: [zuberichat, versioning, closeout-checklist]

- decision: "Whisper port assignment"
  choice: "CEG:8200"
  rationale: "8000 = Chroma (existing), 8100 = reserved for RTL-058 FastAPI routing shim. 8200 was the next available."
  session: 23
  tags: [whisper, ceg, ports]

- decision: "Coaching bridge architecture"
  choice: "OpenClaw REST API (/v1/chat/completions), not UI automation"
  rationale: "Deep research showed UI automation (FlaUI, SendKeys, clipboard) is fragile for Electron/Tauri apps. OpenClaw's REST endpoint routes through full agent pipeline — tools, memory, skills, identity. Pure HTTP, no window manipulation, no dependencies."
  session: 23
  tags: [coaching-bridge, openclaw, api]

- decision: "sandbox.mode set to off"
  choice: "off"
  rationale: "Required for /v1/chat/completions. The openai-compat route spawns a session sub-agent that hits sandbox.mode='non-main'. Docker-in-Docker not available inside the gateway container. Safe because gateway is local/Tailscale only."
  session: 23
  tags: [openclaw, security, sandbox]

- decision: "YouTube Watcher for transcript extraction"
  choice: "Michaelgathara/youtube-watcher from ClawHub"
  rationale: "222 stars, 363 installs, clean security scan, MIT-0, no telemetry, no external API. Uses yt-dlp for subtitle extraction. Chosen over TranscriptAPI (paid) and VPN-based alternatives (security risk)."
  session: 23
  tags: [youtube, transcripts, clawhub, skills]

- decision: "Turn budget: 9 exec calls"
  choice: "9 per task"
  rationale: "Prevents context bloat from retry loops. Zuberi burned 15+ turns on Whisper file-write task by retrying the same failing approach. 9 is enough for a real task done right. Will increase to 15 after RTX 3090 upgrade."
  session: 23
  tags: [agents, discipline, context]

- decision: "Learning data lives on CEG, not KILO workspace"
  choice: "CEG /opt/zuberi/data/learning/"
  rationale: "Whisper is on CEG, yt-dlp runs on CEG, transcripts stay where they're generated. Avoids cross-node file transfers."
  session: 23
  tags: [learning, ceg, storage]

- decision: "Mandatory workspace audit every architect session"
  choice: "Both automated (n8n) and manual (session checklist)"
  rationale: "Session 23 discovered Zuberi silently gutted infrastructure SKILL.md (367→11 lines) and wiped corrections log (8→1 entry). Without audits, regressions compound across sessions."
  session: 23
  tags: [audit, integrity, agents]
