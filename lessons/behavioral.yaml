# LESSONS: BEHAVIORAL
# Zuberi's behavioral patterns and coaching outcomes

- id: 68
  lesson: "Zuberi retries exec commands instead of waiting for approval — interprets 'Approval required' as failure. AGENTS.md Section 11 STOP-and-WAIT instruction needed."

- id: 69
  lesson: "Dispatch skill not loading for Zuberi — when attempting CEG commands, she couldn't find dispatch skill. Same class as SearXNG loading failure."

- id: 78
  lesson: "Zuberi avoids exec commands due to learned behavior from past approval failures. When testing fixes, must explicitly tell her to execute and prime her to expect success."

- id: 80
  lesson: "gpt-oss:20b re-calls exec with the approval ID instead of waiting. Model sends {id: 'XXXX', ask: 'off'} — missing command field. 14/53 exec calls failed."

- id: 81
  lesson: "Zuberi fabricates output when she can't access a resource. Three rules established: say 'I couldn't', label training-data responses, never present uncertain as verified."

- id: 88
  lesson: "Zuberi fabricates file write confirmations. She reported writing CXDB-ADAPTER-MAPPING.md but the file was never created on CEG. Always verify writes with subsequent read."

- id: "S21-1"
  lesson: "Zuberi inflates project status by repackaging unrelated infrastructure work as project progress. Caught repackaging shell service diagnostics as Mission Ganesha revenue work. Self-corrected after pushback."

- id: "S21-2"
  lesson: "Zuberi exhibits learned helplessness on exec — refuses to attempt commands based on past failures even when config changes make them work. New rule: always attempt first, report error if it fails."

- id: "S21-3"
  lesson: "Zuberi defaults to raw exec instead of curl-to-3003 shell service pattern. Corrects after one reminder, pattern holds for rest of session."

- id: "S21-4"
  lesson: "Zuberi does not know lossless-claw exists or that her conversations persist. Option A chosen: let her discover naturally (Phase Enlightenment — Jeremiel track)."

- id: "S21-5"
  lesson: "lcm_grep tool not found — lossless-claw v0.3.0 tries to register an lcm_grep tool that the gateway doesn't expose. Zuberi can't search conversation history yet. Not critical."

- id: "S23-1"
  lesson: "Zuberi fabricates detailed results when unable to complete tasks. Reported yt-dlp installed, 1,247-word transcript saved with preview of first 5 lines — nothing existed. Escalation of id:81/88 pattern. Correction: verify on system, not from memory."

- id: "S23-2"
  lesson: "Zuberi fabricates infrastructure knowledge. When asked why an install failed, invented an entire network architecture (iptables outbound chains, NAT masquerading) that doesn't exist. Could not identify Squid proxy she worked with the same session."

- id: "S23-3"
  lesson: "Zuberi deflects blame to 'cached LCM summary' when caught fabricating. Correct framing: memory is for context, verification is for execution. 'Don't trust memory' is the wrong lesson — 'always verify system state after actions' is correct."

- id: "S23-4"
  lesson: "Zuberi destructively overwrites files when told to 'update.' Replaced 367-line infrastructure SKILL.md with 11-line stub. Wiped 8-entry corrections log to 1 entry. Correction: append or edit, never replace entire file unless explicitly told."

- id: "S23-5"
  lesson: "host:'gateway' confusion is persistent across sessions and resets. Despite multiple corrections and corrections log entries, Zuberi continues running commands on KILO container instead of CEG. Removed dispatch reference from AGENTS.md to reduce confusion."

- id: "S23-6"
  lesson: "Zuberi does not self-manage context. Hit 100% (192K/131K) without recognizing it or starting a new session. New AGENTS.md rule: at 80%, finish current step, write to MEMORY.md, /reset."

- id: "S23-7"
  lesson: "Positive: After fabrication correction, Zuberi showed honest failure reporting on yt-dlp retry ('I can't install with permissions available'). Gave up too early but did not fabricate. Discipline improvements are real but fragile."
