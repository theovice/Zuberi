- id: 37
  lesson: "OpenClaw memory flush ≠ CXDB — flush is internal pre-compaction housekeeping"

- id: 42
  lesson: "OpenClaw model entry requires 'name' field — omitting causes crash loop"

- id: 43
  lesson: "Gateway restart method: docker compose down + up -d. 'docker compose restart' has OCI namespace error."

- id: 45
  lesson: "Ollama context length slider — check GUI settings. Default 4K may silently cap despite OpenClaw config."

- id: 47
  lesson: "OpenClaw skill loading — name + description in YAML frontmatter determines activation. Bad descriptions = silent skills."

- id: 57
  lesson: "OpenClaw exec approval is gateway-level, not prompt-level. AGENTS.md/TOOLS.md say reads are allowed, but gateway enforces execSecurity independently."

- id: 62
  lesson: "OpenClaw skill hot-reload works via chokidar — 250ms debounce. No gateway restart needed for SKILL.md changes."

- id: 71
  lesson: "gpt-oss:20b uses Harmony response format, not <think> tags. Three channels (analysis/commentary/final). Special tokens decoded as empty strings by Ollama."

- id: 72
  lesson: "Reasoning: low is the only valid suppression for gpt-oss:20b. Values like none, off, false silently default to medium."

- id: 76
  lesson: "v2026.3.8 has exec-approvals.sock initialization bug — 3-18 minute delay after gateway restart."

- id: 80
  lesson: "gpt-oss:20b re-calls exec with approval ID instead of waiting. 14/53 exec calls failed. Fix: AGENTS.md Section 11 STOP-and-WAIT."

- id: 93
  lesson: "tools.exec.ask (not execAsk) is the config schema key. execAsk is the session/RPC name."

- id: 94
  lesson: "Git Bash on KILO mangles container paths (/home/node/ → C:/Program Files/Git/home/node/). Use docker exec <container> sh -c instead."

- id: "S22-5"
  lesson: "tools.allow in openclaw.json is a GLOBAL whitelist. If set, it blocks ALL tools not listed — agent-level overrides cannot enable tools that are globally blocked. The dashboard even warns: 'Global tools.allow is set. Agent overrides cannot enable tools that are globally blocked.' Session 22 discovered tools.allow was set to [read, write, exec], blocking browser, web_search, web_fetch, memory, sessions, and 24 other tools. Fix: delete tools.allow entirely so all tools are available, controlled by agent-level settings."

- id: "S22-6"
  lesson: "tools.web.search.enabled and tools.web.fetch.enabled were set to false in openclaw.json — explicitly disabling web search and fetch. Must be true for Zuberi to search/fetch."

- id: "S22-7"
  lesson: "/reset in the dashboard or chat resets the session but also drops dashboard auth — requires re-entering the token. Use /reset from ZuberiChat instead (auto-reconnects). Cannot delete agent:main:main session through dashboard — it's the primary session."

- id: "S22-8"
  lesson: "Session tool loading: the session JSON stores a snapshot of which tools were loaded at session creation. If tools.allow was restrictive at session creation time, the session only has those tools. /reset or new session needed to pick up config changes."
